dataset:
  name: 3D_FUTURE 
  category: chair 
  n_points: 2048
  split: train
  path: /kaggle/input/datasets/sanvik74/3dfuture-processed  # 🔥 ADD THIS LINE

model:
  name: SnowflakeNet
  dim_feat: 512 
  up_factors: [ 2, 2]
  num_pc: 256
  num_p0: 512
  bounding: True
  radius: 1.0

optimizer: {
    type: Adam,
    kwargs: {
      lr: 0.00008, 
      weight_decay: 0,
      betas: [.9, .999]
    }}
scheduler: {
  type: StepLR,
  kwargs: {
    decay_step: 50, 
    gamma: 0.5, 
  }}

train :
  seed: 1
  device: [0]          # FIXED: Kaggle uses GPU 0
  batch_size: 16       # FIXED: 16 is stable for 16GB VRAM
  num_workers: 0       # FIXED: Reduced to prevent CPU bottleneck
  epochs: 300
  save_freq: 200
  out_path: ./outpath_snow
  resume: False
  coarse_num: 256
  source_model_path: /kaggle/input/models/sanvik74/pretrained-source-models/pytorch/default/1/snowflakenet_crn.pth # FIXED

test :
  split: test
  batch_size: 1 
  num_workers: 0
  gpu: [0]             # FIXED
  loss_func: cd_l2